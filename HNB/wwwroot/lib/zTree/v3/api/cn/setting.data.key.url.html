<div class="apiDetail">
<div>
	<h2><span>String</span><span class="path">setting.data.key.</span>url</h2>
	<h3>概述<span class="h3_info">[ 依赖 <span class="highlight_green">jquery.ztree.core</span> 核心 js ]</span></h3>
	<div class="desc">
		<p></p>
		<div class="longdesc">
			<p>zTree 結點資料保存結點链接的目标 URL 的属性名称。</p>
			<p class="highlight_red">特殊用途：当後台資料只能生成 url 属性，又不想实现點擊結點跳转的功能时，可以直接修改此属性為其他不存在的属性名称</p>
			<p>默认值："url"</p>
		</div>
	</div>
	<h3>setting 举例</h3>
	<h4>1. 设置 zTree 顯示結點时，将 treeNode 的 xUrl 属性当做結點链接的目标 URL</h4>
	<pre xmlns=""><code>var setting = {
	data: {
		key: {
			url: "xUrl"
		}
	}
};
......</code></pre>
</div>
</div>

<div class="apiDetail">
<div>
	<h2><span>String</span><span class="path">setting.data.key.</span>url</h2>
	<h3>概述<span class="h3_info">[ 依赖 <span class="highlight_green">jquery.ztree.core</span> 核心 js ]</span></h3>
	<div class="desc">
		<p></p>
		<div class="longdesc">
			<p>zTree 節點資料保存節點連結的目標 URL 的属性名稱。</p>
			<p class="highlight_red">特殊用途：當後台資料只能生成 url 属性，又不想實現點击節點跳转的功能時，可以直接修改此属性為其他不存在的属性名稱</p>
			<p>默認值："url"</p>
		</div>
	</div>
	<h3>setting 举例</h3>
	<h4>1. 設置 zTree 顯示節點時，將 treeNode 的 xUrl 属性當做節點連結的目標 URL</h4>
	<pre xmlns=""><code>var setting = {
	data: {
		key: {
			url: "xUrl"
		}
	}
};
......</code></pre>
</div>
</div>

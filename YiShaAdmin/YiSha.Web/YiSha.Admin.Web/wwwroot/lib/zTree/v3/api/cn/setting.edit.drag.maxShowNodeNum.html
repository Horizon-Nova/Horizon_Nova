<div class="apiDetail">
<div>
	<h2><span>Number</span><span class="path">setting.edit.drag.</span>maxShowNodeNum</h2>
	<h3>概述<span class="h3_info">[ 依赖 <span class="highlight_green">jquery.ztree.exedit</span> 扩展 js ]</span></h3>
	<div class="desc">
		<p></p>
		<div class="longdesc">
			<p>拖拽多個兄弟節點時，浮動圖層中顯示的最大節點數。 多余的節點用...代替。<span class="highlight_red">[setting.edit.enable = true 時生效]</span></p>
			<p>默認值：5</p>
			<p class="highlight_red">請根据自己的需求适當調整此值</p>
		</div>
	</div>
	<h3>setting 举例</h3>
	<h4>1. 設置拖拽時最多可顯示10個節點</h4>
	<pre xmlns=""><code>var setting = {
	edit: {
		enable: true,
		drag: {
			maxShowNodeNum: 10
		}
	}
};
......</code></pre>
</div>
</div>

name: Build & Deploy HNB to Deploy branch

on:
  push:
    branches:
      - main

jobs:
  deploy-hnb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Deploy branch
        uses: actions/checkout@v4
        with:
          ref: Deploy
          fetch-depth: 0
          clean: true

      - name: Clean old deploy output
        run: rm -rf DeployFile

      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          path: main
          ref: main

      - name: Build & Publish HNB
        working-directory: ./main/HNB
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet publish -c Release -o ../../DeployFile

      - name: Commit & Push to Deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DeployFile
          git commit -m "Update DeployFile from HNB"
          git push origin Deploy

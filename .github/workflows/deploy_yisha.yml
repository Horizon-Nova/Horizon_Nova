name: Build & Deploy YiShaAdmin to Management_System branch

on:
  push:
    branches: [ main ]

jobs:
  deploy-yisha:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: Management_System
          fetch-depth: 0
          clean: true

      - run: |
          mkdir -p DeployFile
          rm -rf DeployFile/* DeployFile/.* 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - working-directory: ./main/YiShaAdmin/YiSha.Web/YiSha.Admin.Web
        run: |
          dotnet restore
          dotnet publish -c Release -o "$GITHUB_WORKSPACE/DeployFile"

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DeployFile
          git commit -m "Update DeployFile from YiShaAdmin"
          git push origin Management_System

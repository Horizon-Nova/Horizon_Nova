name: Build & Deploy YiShaAdmin to Management_System branch

on:
  push:
    branches:
      - main

jobs:
  deploy-yisha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Management_System branch
        uses: actions/checkout@v4
        with:
          ref: Management_System
          fetch-depth: 0
          clean: true

      - name: Ensure DeployFile exists
        run: mkdir -p DeployFile

      - name: Clean old deploy output
        run: |
          rm -rf DeployFile/*
          rm -rf DeployFile/.* 2>/dev/null || true

      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          path: main
          ref: main

      - name: Build & Publish YiShaAdmin
        working-directory: ./main/YiShaAdmin/YiSha.Web/YiSha.Admin.Web
        run: |
          dotnet restore
          dotnet build -c Release
          dotnet publish -c Release -o ../../../../../DeployFile

      - name: Commit & Push to Management_System
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DeployFile
          git commit -m "Update DeployFile from YiShaAdmin"
          git push origin Management_System
